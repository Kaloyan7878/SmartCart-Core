<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Budget</title>
</head>
<body>
    <h2>Edit Budget for {{ household.name }}</h2>
    <form method="POST">
        {% csrf_token %}
        <p>
            <label for="budget_monthly">New Monthly Budget ($):</label>
            <input type="number" id="budget_monthly" name="budget_monthly" step="0.01" value="{{ household.budget_monthly }}" required>
        </p>
        <button type="submit">Update Budget</button>
    </form>
    <br>
    <a href="{% url 'household_list' %}">Cancel and Back</a>
</body>
</html>
