<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Household</title>
</head>
<body>
    <h2>Create a New Household</h2>
    <form method="POST">
        {% csrf_token %}
        <p>
            <label for="name">Household Name:</label>
            <input type="text" id="name" name="name" required>
        </p>
        <p>
            <label for="budget_monthly">Monthly Budget ($):</label>
            <input type="number" id="budget_monthly" name="budget_monthly" step="0.01" required>
        </p>
        <button type="submit">Save Household</button>
    </form>
    <br>
    <a href="{% url 'household_list' %}">Cancel and Back</a>
</body>
</html>
