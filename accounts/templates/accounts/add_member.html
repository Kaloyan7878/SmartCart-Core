<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Member</title>
</head>
<body>
    <h2>Add a Member to {{ household.name }}</h2>

    {% if error %}
        <p style="color: red; font-weight: bold;">{{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <p>
            <label for="username">Enter Username of the User:</label>
            <input type="text" id="username" name="username" required>
        </p>
        <button type="submit">Add to Household</button>
    </form>
    <br>
    <a href="{% url 'household_detail' household.id %}">Cancel and Back</a>
</body>
</html>
